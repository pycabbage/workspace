name: Build and Push

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    steps:
      - uses: actions/checkout@v6
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=${{ github.event_name != 'pull_request' }}
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push
        uses: docker/bake-action@v7
        id: push
        with:
          files: |
            docker-bake.hcl
            cwd://${{ steps.meta.outputs.bake-file }}
          targets: default
          push: ${{ github.event_name != 'pull_request' }}
          provenance: true
          set: |
            default.cache-from=type=gha
            default.cache-to=type=gha,mode=max
      - name: Attest build provenance
        uses: actions/attest@v4
        if: ${{ github.event_name != 'pull_request' }}
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ fromJSON(steps.push.outputs.metadata).default['containerimage.digest'] }}
          push-to-registry: true
      - name: Test image
        run: |
          BAKE_ENV="$(
            docker run \
              -it --rm \
              -v ./docker-bake.hcl:/tmp/docker-bake.hcl \
              tmccombs/hcl2json /tmp/docker-bake.hcl | \
            docker run \
              --rm -i \
              ghcr.io/jqlang/jq:latest \
              -r '.target.default[0].args | to_entries[] | "-e BAKE_\(.key)=\(.value)"'
          )"
          docker run \
            --group-add 1001 \
            -it \
            --rm \
            -e TERM \
            -e LANG \
            $BAKE_ENV \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v ./scripts.d/99-test.sh:/opt/test.sh:ro \
            ${{ steps.meta.outputs.tags[0] }} \
            /opt/test.sh
